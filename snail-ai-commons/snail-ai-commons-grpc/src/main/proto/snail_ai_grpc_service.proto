syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.aizuda.snail.ai.common.grpc.auto";

// 统一请求信封
message GrpcSnailAiRequest {
  int64  reqId    = 1;
  Metadata metadata = 2;
  string body      = 3;
}

// 统一响应信封
message GrpcSnailAiResult {
  int64  reqId    = 1;
  int32  status   = 2;
  string message  = 3;
  string data     = 4;
}

message Metadata {
  string uri = 3;
  map<string, string> headers = 7;
}
